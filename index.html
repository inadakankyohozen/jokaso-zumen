<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>浄化槽図面検索システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
  --accent:#3d8ef0;--accent2:#5ba3ff;--accent-glow:rgba(61,142,240,0.15);
  --text:#e8eaf0;--text2:#8892a4;--text3:#4a5568;
  --success:#34d399;--warning:#fbbf24;--danger:#fc8181;
  --tag-bg:rgba(61,142,240,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}
#loadingScreen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:500;gap:16px;transition:opacity .4s;
}
#loadingScreen.hidden{opacity:0;pointer-events:none;}
.loading-logo{font-size:40px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.loading-text{font-size:13px;color:var(--text2);}
.loading-bar{width:200px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.loading-bar-inner{height:100%;background:var(--accent);border-radius:2px;animation:loading 1.8s ease-in-out infinite;}
@keyframes loading{0%{width:0;margin-left:0;}50%{width:60%;margin-left:20%;}100%{width:0;margin-left:100%;};}
#app{display:none;flex-direction:column;min-height:100vh;}
#app.visible{display:flex;}
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 16px;height:56px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:50;
}
.header-logo{font-size:20px;}
.header-title{font-size:14px;font-weight:700;flex:1;}
.search-area{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 16px;
}
.search-grid{
  max-width:720px;margin:0 auto;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;
}
@media(max-width:540px){.search-grid{grid-template-columns:1fr;gap:8px;}}
.search-label{
  font-size:10px;color:var(--text2);letter-spacing:.07em;
  margin-bottom:5px;display:flex;align-items:center;gap:4px;
}
.search-input-wrap{position:relative;}
.search-field-input{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:10px 32px 10px 12px;color:var(--text);
  font-size:14px;font-family:inherit;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.search-field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.search-field-input::placeholder{color:var(--text3);font-size:12px;}
.field-clear{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:13px;padding:3px;display:none;line-height:1;transition:color .15s;
}
.field-clear:hover{color:var(--text);}
.field-clear.visible{display:block;}
.ac-list{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;z-index:300;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  max-height:220px;overflow-y:auto;display:none;
}
.ac-list.open{display:block;}
.ac-item{
  padding:10px 14px;font-size:13px;cursor:pointer;
  transition:background .1s;display:flex;align-items:center;gap:8px;
}
.ac-item:first-child{border-radius:8px 8px 0 0;}
.ac-item:last-child{border-radius:0 0 8px 8px;}
.ac-item:hover,.ac-item.focused{background:var(--accent-glow);color:var(--accent2);}
.ac-item mark{background:rgba(61,142,240,.25);color:var(--accent2);border-radius:2px;padding:0 2px;}
.tab-row{
  display:flex;gap:8px;max-width:720px;margin:0 auto;
  align-items:center;flex-wrap:wrap;
}
.tab-label{font-size:11px;color:var(--text2);margin-right:2px;white-space:nowrap;}
.tab-btn{
  padding:6px 18px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-size:13px;
  font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.reset-btn{
  margin-left:auto;padding:5px 14px;border-radius:20px;
  border:1px solid var(--border);background:transparent;
  color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;
}
.reset-btn:hover{color:var(--text);border-color:var(--text2);}
.content{flex:1;padding:20px 16px;max-width:820px;margin:0 auto;width:100%;}
.section-label{
  font-size:11px;color:var(--text2);letter-spacing:.08em;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.fav-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;}
.fav-chip{
  background:var(--tag-bg);border:1px solid rgba(61,142,240,.3);
  border-radius:8px;padding:8px 14px;font-size:13px;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;
}
.fav-chip:hover{background:rgba(61,142,240,.22);border-color:var(--accent);}
.fav-chip .star{color:var(--warning);font-size:12px;}
.fav-name{font-weight:600;}
.fav-sub{font-size:11px;color:var(--text2);}
.fav-empty{font-size:13px;color:var(--text3);padding:8px 0 20px;}
.history-list{display:flex;flex-direction:column;gap:3px;margin-bottom:28px;}
.history-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;cursor:pointer;
  transition:background .15s;font-size:13px;
}
.history-item:hover{background:var(--surface2);}
.history-icon{color:var(--text3);font-size:14px;flex-shrink:0;}
.history-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.history-time{font-size:11px;color:var(--text3);flex-shrink:0;}
#results{display:flex;flex-direction:column;gap:6px;}
.result-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;gap:12px;
}
.result-card:hover{border-color:var(--accent);background:var(--surface2);transform:translateX(2px);}
.result-icon{
  width:42px;height:42px;background:var(--tag-bg);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.result-info{flex:1;min-width:0;}
.result-name{font-size:14px;font-weight:700;margin-bottom:3px;}
.result-meta{font-size:12px;color:var(--text2);}
.result-jinso{color:var(--accent2);font-weight:600;}
.result-badge{font-size:10px;padding:2px 9px;border-radius:4px;font-weight:700;flex-shrink:0;}
.badge-s{background:rgba(52,211,153,.12);color:var(--success);border:1px solid rgba(52,211,153,.3);}
.badge-g{background:rgba(251,191,36,.12);color:var(--warning);border:1px solid rgba(251,191,36,.3);}
.result-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.star-btn{
  width:34px;height:34px;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--text3);cursor:pointer;font-size:15px;
  transition:all .15s;display:flex;align-items:center;justify-content:center;
}
.star-btn:hover{background:var(--surface2);color:var(--text);}
.star-btn.on{color:var(--warning);border-color:rgba(251,191,36,.4);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2);}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:.35;}
.empty-text{font-size:14px;}
.empty-sub{font-size:12px;color:var(--text3);margin-top:6px;}
#pdfModal{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.93);
  z-index:200;display:none;flex-direction:column;
}
#pdfModal.open{display:flex;}
.modal-header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.modal-title{
  flex:1;font-size:13px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.modal-badge-wrap{display:flex;gap:6px;flex-shrink:0;}
.modal-close{
  width:34px;height:34px;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--text2);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;
}
.modal-close:hover{background:rgba(252,129,129,.1);color:var(--danger);border-color:var(--danger);}
.modal-footer{
  background:var(--surface);border-top:1px solid var(--border);
  padding:10px 14px;display:flex;gap:8px;
  justify-content:center;flex-shrink:0;flex-wrap:wrap;
}
.modal-btn{
  padding:9px 20px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:13px;
  font-family:inherit;cursor:pointer;font-weight:500;transition:all .15s;
  display:flex;align-items:center;gap:6px;
}
.modal-btn:hover{background:var(--border);}
.modal-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.modal-btn.primary:hover{background:var(--accent2);}
.modal-btn.fav-btn.on{color:var(--warning);}
.hint-toast{
  position:fixed;bottom:76px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.82);color:#fff;font-size:12px;
  padding:8px 18px;border-radius:20px;pointer-events:none;
  opacity:0;transition:opacity .25s;z-index:400;white-space:nowrap;
}
.hint-toast.show{opacity:1;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.card-icon-btn{width:34px;height:34px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:15px;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.card-icon-btn:hover{background:var(--surface2);color:var(--text);}
</style>
</head>
<body>
<!-- ローディング -->
<div id="loadingScreen">
  <div class="loading-logo">🗂️</div>
  <div class="loading-text">図面データを読み込んでいます...</div>
  <div class="loading-bar"><div class="loading-bar-inner"></div></div>
</div>
<!-- メイン -->
<div id="app">
  <header>
    <span class="header-logo">🗂️</span>
    <span class="header-title">浄化槽図面検索システム</span>
  </header>
  <div class="search-area">
    <div class="search-grid">
      <div class="search-field">
        <div class="search-label">🏭 メーカー名</div>
        <div class="search-input-wrap">
          <input class="search-field-input" id="inMaker" type="text" placeholder="例）クボタ、ニッコー"
            oninput="onInput('maker')" onkeydown="onKD(event,'maker')" onblur="delayClose('maker')" autocomplete="off" autocapitalize="off">
          <button class="field-clear" id="clrMaker" onclick="clearF('maker')">✕</button>
          <div class="ac-list" id="acMaker"></div>
        </div>
      </div>
      <div class="search-field">
        <div class="search-label">🔖 型　式</div>
        <div class="search-input-wrap">
          <input class="search-field-input" id="inSeries" type="text" placeholder="例）K-TC、BN、NSR"
            oninput="onInput('series')" onkeydown="onKD(event,'series')" onblur="delayClose('series')" autocomplete="off" autocapitalize="off">
          <button class="field-clear" id="clrSeries" onclick="clearF('series')">✕</button>
          <div class="ac-list" id="acSeries"></div>
        </div>
      </div>
      <div class="search-field">
        <div class="search-label">👥 人　槽</div>
        <div class="search-input-wrap">
          <input class="search-field-input" id="inJinso" type="text" placeholder="例）5、10、32、50"
            oninput="onInput('jinso')" onkeydown="onKD(event,'jinso')" onblur="delayClose('jinso')" autocomplete="off">
          <button class="field-clear" id="clrJinso" onclick="clearF('jinso')">✕</button>
          <div class="ac-list" id="acJinso"></div>
        </div>
      </div>
    </div>
    <div class="tab-row">
      <span class="tab-label">種別：</span>
      <button class="tab-btn active" onclick="setTab('all',this)">すべて</button>
      <button class="tab-btn" onclick="setTab('単独',this)">単独処理</button>
      <button class="tab-btn" onclick="setTab('合併',this)">合併処理</button>
      <button class="reset-btn" onclick="resetAll()">🔄 リセット</button>
    </div>
  </div>
  <div class="content">
    <div id="homeView">
      <div class="section-label">⭐ お気に入り</div>
      <div class="fav-list" id="favList"></div>
      <div class="section-label">🕐 最近見た図面</div>
      <div class="history-list" id="historyList"></div>
    </div>
    <div id="searchView" style="display:none">
      <div class="section-label" id="resultLabel">検索結果</div>
      <div id="results"></div>
    </div>
  </div>
</div>
<!-- PDFモーダル -->
<div id="pdfModal">
  <div class="modal-header">
    <span style="font-size:16px;flex-shrink:0">📄</span>
    <span class="modal-title" id="modalTitle"></span>
    <div class="modal-badge-wrap" id="modalBadges"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div id="pdfViewport" style="flex:1;min-height:0;position:relative;">
    <div id="pdfContent" style="position:absolute;inset:0;"></div>
  </div>
  <div class="modal-footer">
    <button class="modal-btn fav-btn" id="favModalBtn" onclick="toggleFav()">☆ お気に入り</button>
    <button class="modal-btn primary" id="dlBtn" onclick="window.open(currentDownloadUrl,'_blank')">⬇ ダウンロード</button>
    <button class="modal-btn" onclick="closeModal()">← 検索に戻る</button>
  </div>
</div>
<div class="hint-toast" id="hintToast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
'use strict';
const CONFIG = {
  DRAW_CSV_URL: 'drawings.csv',
};
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let DRAWINGS = [];
let favorites = {};
let viewHistory = {};
let selMaker='', selSeries='', selJinso='', currentTab='all';
let fiIdx = {maker:-1, series:-1, jinso:-1};
let currentItem = null;
let pdfDoc = null;
let currentDownloadUrl = '';

// ─── 初期化（ログインなしで即起動）───
window.addEventListener('DOMContentLoaded', async () => {
  try {
    await loadCSVFiles();
  } catch(e) {
    console.error('CSV読み込みエラー:', e);
    DRAWINGS = DEMO_DRAWINGS;
  }
  loadLocalData();
  hideLoading();
  showApp();
});

async function loadCSVFiles() {
  const res = await fetch(CONFIG.DRAW_CSV_URL);
  if (!res.ok) throw new Error('CSV取得失敗');
  const text = await res.text();
  if (text.trim().startsWith('<!')) throw new Error('HTMLが返されました');
  DRAWINGS = parseCSV(text);
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/).filter(l=>l.trim());
  const headers = lines[0].split(',').map(h=>h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v=>v.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = vals[i] ?? '');
    return obj;
  });
}

// ─── ローカルストレージ（お気に入り・履歴）───
function loadLocalData() {
  const rawFav  = localStorage.getItem('jokaso_fav');
  const rawHist = localStorage.getItem('jokaso_hist');
  favorites   = rawFav  ? JSON.parse(rawFav)  : [];
  viewHistory = rawHist ? JSON.parse(rawHist) : [];
}
function saveLocalData() {
  localStorage.setItem('jokaso_fav',  JSON.stringify(favorites));
  localStorage.setItem('jokaso_hist', JSON.stringify(viewHistory));
}
function myFavs() { return favorites  || []; }
function myHist() { return viewHistory || []; }

function hideLoading() {
  const el = document.getElementById('loadingScreen');
  el.classList.add('hidden');
  setTimeout(() => el.style.display = 'none', 500);
}

function showApp() {
  document.getElementById('app').classList.add('visible');
  renderHome();
}

// ─── ホーム描画 ───
function renderHome() {
  const favDiv = document.getElementById('favList');
  const favs = myFavs();
  if (!favs.length) {
    favDiv.innerHTML = '<div class="fav-empty">お気に入りはまだありません。図面を開いて ☆ を押して登録できます。</div>';
  } else {
    favDiv.innerHTML = favs.map(key => {
      const [maker,series,jinso] = key.split('|');
      return `<div class="fav-chip" onclick="openByKey('${key}')">
        <span class="star">★</span>
        <div><div class="fav-name">${series}</div>
        <div class="fav-sub">${maker} · ${jinso}人槽</div></div>
      </div>`;
    }).join('');
  }
  const histDiv = document.getElementById('historyList');
  const hist = myHist().slice(0, 8);
  if (!hist.length) {
    histDiv.innerHTML = '<div class="fav-empty">まだ閲覧履歴がありません。</div>';
  } else {
    histDiv.innerHTML = hist.map(h => {
      const d = findDrawing(h.maker, h.series, h.jinso);
      if (!d) return '';
      return `<div class="history-item" onclick="openPDF('${h.maker}','${h.series}',${h.jinso})">
        <span class="history-icon">📄</span>
        <span class="history-name">${d['ファイル名']}（${h.jinso}人槽）</span>
        <span class="history-time">${h.time}</span>
      </div>`;
    }).join('');
  }
}

function findDrawing(maker, series, jinso) {
  return DRAWINGS.find(d =>
    d['メーカー'] === maker &&
    d['型式'] === series &&
    String(d['人槽']) === String(jinso)
  );
}
function openByKey(key) {
  const [maker,series,jinso] = key.split('|');
  openPDF(maker, series, Number(jinso));
}

// ─── オートコンプリート ───
function getFieldId(f) { return {maker:'inMaker',series:'inSeries',jinso:'inJinso'}[f]; }
function getAcId(f)    { return {maker:'acMaker',series:'acSeries',jinso:'acJinso'}[f]; }
function getClearId(f) { return {maker:'clrMaker',series:'clrSeries',jinso:'clrJinso'}[f]; }

function getCandidates(field) {
  const mQ = document.getElementById('inMaker').value.trim().toLowerCase();
  const sQ = document.getElementById('inSeries').value.trim().toLowerCase();
  const jQ = document.getElementById('inJinso').value.replace('人槽','').trim();
  const base = DRAWINGS.filter(d => {
    const tabOk = currentTab==='all' || d['種別']===currentTab;
    const mOk = field==='maker' || !selMaker || d['メーカー']===selMaker;
    const sOk = field==='series' || !selSeries || d['型式']===selSeries;
    const jOk = field==='jinso' || !selJinso || String(d['人槽'])===selJinso;
    return tabOk && mOk && sOk && jOk;
  });
  if (field==='maker')  return [...new Set(base.map(d=>d['メーカー']))];
  if (field==='series') return [...new Set(base.map(d=>d['型式']))];
  if (field==='jinso')  return [...new Set(base.map(d=>d['人槽']))].sort((a,b)=>Number(a)-Number(b)).map(String);
}

function onInput(field) {
  const val = document.getElementById(getFieldId(field)).value;
  document.getElementById(getClearId(field)).classList.toggle('visible', val.length > 0);
  if (field==='maker')  selMaker='';
  if (field==='series') selSeries='';
  if (field==='jinso')  selJinso='';
  fiIdx[field] = -1;
  const q = val.replace('人槽','').trim();
  const cands = getCandidates(field).filter(c => String(c).toLowerCase().includes(q.toLowerCase()));
  showAC(field, cands, q);
  runSearch();
}

function showAC(field, cands, query) {
  const list = document.getElementById(getAcId(field));
  if (!cands.length || !query) { list.classList.remove('open'); return; }
  list.innerHTML = cands.map(c => {
    const label = field==='jinso' ? c+'人槽' : c;
    const hl = query ? label.replace(new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m=>`<mark>${m}</mark>`) : label;
    return `<div class="ac-item" data-val="${c}" onmousedown="selectItem('${field}','${c}')">${hl}</div>`;
  }).join('');
  list.classList.add('open');
}

function selectItem(field, val) {
  document.getElementById(getFieldId(field)).value = field==='jinso' ? val+'人槽' : val;
  document.getElementById(getClearId(field)).classList.add('visible');
  if (field==='maker')  selMaker=val;
  if (field==='series') selSeries=val;
  if (field==='jinso')  selJinso=val;
  document.getElementById(getAcId(field)).classList.remove('open');
  runSearch();
}

function onKD(e, field) {
  const list = document.getElementById(getAcId(field));
  const items = list.querySelectorAll('.ac-item');
  if (!list.classList.contains('open')) return;
  if (e.key==='ArrowDown') {
    e.preventDefault();
    fiIdx[field] = Math.min(fiIdx[field]+1, items.length-1);
    items.forEach((el,i) => el.classList.toggle('focused', i===fiIdx[field]));
  } else if (e.key==='ArrowUp') {
    e.preventDefault();
    fiIdx[field] = Math.max(fiIdx[field]-1, 0);
    items.forEach((el,i) => el.classList.toggle('focused', i===fiIdx[field]));
  } else if (e.key==='Enter') {
    if (fiIdx[field] >= 0 && items[fiIdx[field]])
      selectItem(field, items[fiIdx[field]].dataset.val);
  } else if (e.key==='Escape') {
    list.classList.remove('open');
  }
}

function delayClose(field) {
  setTimeout(() => document.getElementById(getAcId(field)).classList.remove('open'), 180);
}

function clearF(field) {
  document.getElementById(getFieldId(field)).value = '';
  document.getElementById(getClearId(field)).classList.remove('visible');
  document.getElementById(getAcId(field)).classList.remove('open');
  if (field==='maker')  selMaker='';
  if (field==='series') selSeries='';
  if (field==='jinso')  selJinso='';
  runSearch();
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  runSearch();
}

function resetAll() {
  ['maker','series','jinso'].forEach(f => clearF(f));
  currentTab = 'all';
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn')[0].classList.add('active');
  runSearch();
}

// ─── 検索実行 ───
function runSearch() {
  const mQ = document.getElementById('inMaker').value.trim().toLowerCase();
  const sQ = document.getElementById('inSeries').value.trim().toLowerCase();
  const jQ = document.getElementById('inJinso').value.replace('人槽','').trim();
  const hasFilter = mQ || sQ || jQ || currentTab !== 'all';
  if (!hasFilter) {
    document.getElementById('homeView').style.display = '';
    document.getElementById('searchView').style.display = 'none';
    return;
  }
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('searchView').style.display = '';
  const filtered = DRAWINGS.filter(d => {
    const tOk = currentTab==='all' || d['種別']===currentTab;
    const mOk = !mQ || d['メーカー'].toLowerCase().includes(mQ);
    const sOk = !sQ || d['型式'].toLowerCase().includes(sQ);
    const jOk = !jQ || String(d['人槽'])===jQ;
    return tOk && mOk && sOk && jOk;
  });
  const groups = {};
  filtered.forEach(d => {
    const key = d['メーカー'] + '|' + d['型式'] + '|' + d['ファイル名'];
    if (!groups[key]) groups[key] = { ...d, jinsoList: [] };
    groups[key].jinsoList.push(Number(d['人槽']));
  });
  const grouped = Object.values(groups).map(g => ({
    ...g,
    jinsoList: g.jinsoList.sort((a,b)=>a-b)
  }));
  document.getElementById('resultLabel').textContent = `検索結果：${grouped.length}件`;
  if (!grouped.length) {
    document.getElementById('results').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">条件に一致する図面が見つかりませんでした</div>
        <div class="empty-sub">メーカー名・型式・人槽を変えて再検索してみてください</div>
      </div>`;
    return;
  }
  const targetJ = jQ ? Number(jQ) : null;
  document.getElementById('results').innerHTML = grouped.map(g => {
    const fkey = `${g['メーカー']}|${g['型式']}|${targetJ||g.jinsoList[0]}|${g['種別']}`;
    const isFav = myFavs().includes(fkey);
    const jRange = g.jinsoList.length===1
      ? g.jinsoList[0]+'人槽'
      : g.jinsoList[0]+'〜'+g.jinsoList[g.jinsoList.length-1]+'人槽';
    const jLabel = targetJ
      ? `<span class="result-jinso">${targetJ}人槽</span>（${g['ファイル名']}）`
      : `${jRange}（${g['ファイル名']}）`;
    const showJ = targetJ || g.jinsoList[0];
    const isTan = g['種別']==='単独';
    return `<div class="result-card" onclick="openPDF('${g['メーカー']}','${g['型式']}',${showJ})">
      <div class="result-icon">📄</div>
      <div class="result-info">
        <div class="result-name">${g['メーカー']}　${g['型式']}</div>
        <div class="result-meta">${jLabel}</div>
      </div>
      <div class="result-actions">
        <button class="star-btn ${isFav?'on':''}" title="お気に入り"
          onclick="event.stopPropagation();quickFav('${g['メーカー']}','${g['型式']}',${showJ},'${g['種別']}',this)">
          ${isFav?'★':'☆'}
        </button>
        <span class="result-badge ${isTan?'badge-s':'badge-g'}">${isTan?'単独':'合併'}</span>
      </div>
    </div>`;
  }).join('');
}

function quickFav(maker, series, jinso, type, btn) {
  const key = `${maker}|${series}|${jinso}|${type}`;
  if (!Array.isArray(favorites)) favorites = [];
  if (favorites.includes(key)) {
    favorites = favorites.filter(k=>k!==key);
    btn.textContent = '☆'; btn.classList.remove('on');
  } else {
    favorites.push(key);
    btn.textContent = '★'; btn.classList.add('on');
  }
  saveLocalData();
  renderHome();
}

// ─── PDF表示 ───
function openPDF(maker, series, jinso) {
  const d = findDrawing(maker, series, jinso);
  if (!d) { showHint('図面データが見つかりません'); return; }
  currentItem = { maker, series, jinso, type:d['種別'], filename:d['ファイル名'] };
  // 履歴追加
  if (!Array.isArray(viewHistory)) viewHistory = [];
  viewHistory = [
    { maker, series, jinso, time: formatTime(new Date()) },
    ...viewHistory.filter(h => !(h.maker===maker && h.series===series && h.jinso===jinso))
  ].slice(0, 10);
  saveLocalData();
  renderHome();
  // モーダル
  document.getElementById('modalTitle').textContent = `${d['ファイル名']}（${jinso}人槽）`;
  const isTan = d['種別']==='単独';
  document.getElementById('modalBadges').innerHTML =
    `<span class="result-badge ${isTan?'badge-s':'badge-g'}" style="padding:3px 10px">${isTan?'単独':'合併'}</span>`;
  const key = `${maker}|${series}|${jinso}|${d['種別']}`;
  const isFav = myFavs().includes(key);
  const favBtn = document.getElementById('favModalBtn');
  favBtn.textContent = isFav ? '★ お気に入り済み' : '☆ お気に入り';
  favBtn.classList.toggle('on', isFav);
  document.getElementById('pdfModal').classList.add('open');
  const pdfContent = document.getElementById('pdfContent');
  const rawUrl = d['ファイルURL'] || '';
  const match = rawUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (!match) {
    pdfContent.innerHTML = '<div style="color:var(--danger);padding:40px;text-align:center;">⚠️ 図面のURLが登録されていません。</div>';
    return;
  }
  const fileId = match[1];
  const previewUrl  = `https://drive.google.com/file/d/${fileId}/preview`;
  const downloadUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
  currentDownloadUrl = downloadUrl;
  pdfContent.innerHTML = `<div style="
      position:absolute;inset:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:24px;padding:32px;text-align:center;
      background:#1a1d27;">
    <div style="font-size:56px;">📄</div>
    <div style="font-size:17px;font-weight:700;color:#e8eaf0;line-height:1.6;">
      ${d['メーカー'] || ''}　${d['型式'] || ''}<br>
      <span style="font-size:14px;color:#8892a4;">${d['ファイル名']}</span>
    </div>
    <a href="${previewUrl}" target="_self" style="
      display:inline-block;padding:16px 40px;border-radius:12px;
      background:#3d8ef0;color:#fff;font-size:16px;font-weight:700;
      cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(61,142,240,0.4);
      text-decoration:none;">📄　図面を開く</a>
    <div style="font-size:12px;color:#4a5568;line-height:1.8;">
      タップするとPDFが開きます<br>
      ブラウザの「← 戻る」で検索画面に戻れます
    </div>
  </div>`;
  pdfDoc = true;
}

function closeModal() {
  document.getElementById('pdfModal').classList.remove('open');
  pdfDoc = null;
}

function toggleFav() {
  if (!currentItem) return;
  const { maker, series, jinso, type } = currentItem;
  const key = `${maker}|${series}|${jinso}|${type}`;
  if (!Array.isArray(favorites)) favorites = [];
  const isFav = favorites.includes(key);
  if (isFav) favorites = favorites.filter(k=>k!==key);
  else favorites.push(key);
  saveLocalData();
  const favBtn = document.getElementById('favModalBtn');
  const nowFav = !isFav;
  favBtn.textContent = nowFav ? '★ お気に入り済み' : '☆ お気に入り';
  favBtn.classList.toggle('on', nowFav);
  showHint(nowFav ? '⭐ お気に入りに追加しました' : 'お気に入りから削除しました');
  renderHome();
}

function showHint(msg) {
  const el = document.getElementById('hintToast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1600);
}

function formatTime(d) {
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'たった今';
  if (diff < 3600000) return `${Math.floor(diff/60000)}分前`;
  if (d.toDateString() === now.toDateString()) return `今日 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  return `昨日 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
});
