<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>浄化槽図面検索システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════
   CSS変数・リセット
════════════════════════════════ */
:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
  --accent:#3d8ef0;--accent2:#5ba3ff;--accent-glow:rgba(61,142,240,0.15);
  --text:#e8eaf0;--text2:#8892a4;--text3:#4a5568;
  --success:#34d399;--warning:#fbbf24;--danger:#fc8181;
  --tag-bg:rgba(61,142,240,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ════════════════════════════════
   ローディング画面
════════════════════════════════ */
#loadingScreen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:500;gap:16px;transition:opacity .4s;
}
#loadingScreen.hidden{opacity:0;pointer-events:none;}
.loading-logo{font-size:40px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.loading-text{font-size:13px;color:var(--text2);}
.loading-bar{width:200px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.loading-bar-inner{height:100%;background:var(--accent);border-radius:2px;animation:loading 1.8s ease-in-out infinite;}
@keyframes loading{0%{width:0;margin-left:0;}50%{width:60%;margin-left:20%;}100%{width:0;margin-left:100%;};}

/* ════════════════════════════════
   ログイン画面
════════════════════════════════ */
#loginScreen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:100;transition:opacity .4s,transform .4s;
}
#loginScreen.hidden{opacity:0;transform:scale(1.04);pointer-events:none;}
.login-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:48px 40px;width:min(360px,90vw);
  text-align:center;box-shadow:0 0 80px rgba(61,142,240,0.1);
}
.login-logo{
  width:60px;height:60px;background:var(--accent-glow);
  border:1px solid var(--accent);border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;margin:0 auto 20px;
}
.login-title{font-size:19px;font-weight:700;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:32px;}
.login-field{position:relative;margin-bottom:12px;}
.login-field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);}
.login-input{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:9px;padding:12px 14px 12px 40px;color:var(--text);
  font-size:14px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;
}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.login-btn{
  width:100%;background:var(--accent);color:#fff;border:none;
  border-radius:9px;padding:14px;font-size:15px;font-family:inherit;
  font-weight:700;cursor:pointer;margin-top:6px;transition:background .2s,transform .1s;
  letter-spacing:.03em;
}
.login-btn:hover{background:var(--accent2);}
.login-btn:active{transform:scale(.98);}
.login-error{
  font-size:12px;color:var(--danger);margin-top:10px;
  padding:8px 12px;background:rgba(252,129,129,0.1);
  border:1px solid rgba(252,129,129,0.3);border-radius:6px;
  display:none;
}
.login-error.show{display:block;}

/* ════════════════════════════════
   メイン画面
════════════════════════════════ */
#app{display:none;flex-direction:column;min-height:100vh;}
#app.visible{display:flex;}

/* ヘッダー */
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 16px;height:56px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:50;
}
.header-logo{font-size:20px;}
.header-title{font-size:14px;font-weight:700;flex:1;}
.header-username{font-size:12px;color:var(--text2);margin-right:4px;}
.header-logout{
  font-size:11px;color:var(--text3);background:var(--surface2);
  border:1px solid var(--border);border-radius:20px;
  padding:4px 12px;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.header-logout:hover{color:var(--danger);border-color:var(--danger);}

/* ════════════════════════════════
   検索エリア
════════════════════════════════ */
.search-area{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 16px;
}
.search-grid{
  max-width:720px;margin:0 auto;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;
}
@media(max-width:540px){.search-grid{grid-template-columns:1fr;gap:8px;}}

.search-field{position:relative;}
.search-label{
  font-size:10px;color:var(--text2);letter-spacing:.07em;
  margin-bottom:5px;display:flex;align-items:center;gap:4px;
}
.search-input-wrap{position:relative;}
.search-field-input{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:10px 32px 10px 12px;color:var(--text);
  font-size:14px;font-family:inherit;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.search-field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.search-field-input::placeholder{color:var(--text3);font-size:12px;}
.field-clear{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:13px;padding:3px;display:none;line-height:1;transition:color .15s;
}
.field-clear:hover{color:var(--text);}
.field-clear.visible{display:block;}

/* オートコンプリート */
.ac-list{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;z-index:300;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  max-height:220px;overflow-y:auto;display:none;
}
.ac-list.open{display:block;}
.ac-item{
  padding:10px 14px;font-size:13px;cursor:pointer;
  transition:background .1s;display:flex;align-items:center;gap:8px;
}
.ac-item:first-child{border-radius:8px 8px 0 0;}
.ac-item:last-child{border-radius:0 0 8px 8px;}
.ac-item:hover,.ac-item.focused{background:var(--accent-glow);color:var(--accent2);}
.ac-item mark{background:rgba(61,142,240,.25);color:var(--accent2);border-radius:2px;padding:0 2px;}

/* 種別タブ */
.tab-row{
  display:flex;gap:8px;max-width:720px;margin:0 auto;
  align-items:center;flex-wrap:wrap;
}
.tab-label{font-size:11px;color:var(--text2);margin-right:2px;white-space:nowrap;}
.tab-btn{
  padding:6px 18px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-size:13px;
  font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.reset-btn{
  margin-left:auto;padding:5px 14px;border-radius:20px;
  border:1px solid var(--border);background:transparent;
  color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;
}
.reset-btn:hover{color:var(--text);border-color:var(--text2);}

/* ════════════════════════════════
   コンテンツエリア
════════════════════════════════ */
.content{flex:1;padding:20px 16px;max-width:820px;margin:0 auto;width:100%;}

.section-label{
  font-size:11px;color:var(--text2);letter-spacing:.08em;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* お気に入り */
.fav-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;}
.fav-chip{
  background:var(--tag-bg);border:1px solid rgba(61,142,240,.3);
  border-radius:8px;padding:8px 14px;font-size:13px;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;
}
.fav-chip:hover{background:rgba(61,142,240,.22);border-color:var(--accent);}
.fav-chip .star{color:var(--warning);font-size:12px;}
.fav-name{font-weight:600;}
.fav-sub{font-size:11px;color:var(--text2);}
.fav-empty{font-size:13px;color:var(--text3);padding:8px 0 20px;}

/* 履歴 */
.history-list{display:flex;flex-direction:column;gap:3px;margin-bottom:28px;}
.history-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;cursor:pointer;
  transition:background .15s;font-size:13px;
}
.history-item:hover{background:var(--surface2);}
.history-icon{color:var(--text3);font-size:14px;flex-shrink:0;}
.history-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.history-time{font-size:11px;color:var(--text3);flex-shrink:0;}

/* 検索結果 */
#results{display:flex;flex-direction:column;gap:6px;}
.result-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;gap:12px;
}
.result-card:hover{border-color:var(--accent);background:var(--surface2);transform:translateX(2px);}
.result-icon{
  width:42px;height:42px;background:var(--tag-bg);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.result-info{flex:1;min-width:0;}
.result-name{font-size:14px;font-weight:700;margin-bottom:3px;}
.result-meta{font-size:12px;color:var(--text2);}
.result-jinso{color:var(--accent2);font-weight:600;}
.result-badge{font-size:10px;padding:2px 9px;border-radius:4px;font-weight:700;flex-shrink:0;}
.badge-s{background:rgba(52,211,153,.12);color:var(--success);border:1px solid rgba(52,211,153,.3);}
.badge-g{background:rgba(251,191,36,.12);color:var(--warning);border:1px solid rgba(251,191,36,.3);}
.result-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.star-btn{
  width:34px;height:34px;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--text3);cursor:pointer;font-size:15px;
  transition:all .15s;display:flex;align-items:center;justify-content:center;
}
.star-btn:hover{background:var(--surface2);color:var(--text);}
.star-btn.on{color:var(--warning);border-color:rgba(251,191,36,.4);}

.empty-state{text-align:center;padding:60px 20px;color:var(--text2);}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:.35;}
.empty-text{font-size:14px;}
.empty-sub{font-size:12px;color:var(--text3);margin-top:6px;}

/* ════════════════════════════════
   PDFビューアモーダル
════════════════════════════════ */
#pdfModal{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.93);
  z-index:200;display:none;flex-direction:column;
}
#pdfModal.open{display:flex;}

/* モーダルヘッダー */
.modal-header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.modal-title{
  flex:1;font-size:13px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.modal-badge-wrap{display:flex;gap:6px;flex-shrink:0;}
.modal-close{
  width:34px;height:34px;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--text2);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;
}
.modal-close:hover{background:rgba(252,129,129,.1);color:var(--danger);border-color:var(--danger);}

/* ツールバー */
.pdf-toolbar{
  background:var(--surface2);border-bottom:1px solid var(--border);
  padding:7px 12px;display:flex;align-items:center;gap:6px;
  flex-shrink:0;flex-wrap:wrap;
}
.tb-btn{
  height:32px;padding:0 12px;border-radius:7px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);cursor:pointer;
  font-size:13px;font-family:inherit;transition:all .15s;
  display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;
}
.tb-btn:hover{background:var(--surface2);color:var(--text);}
.tb-btn:active{transform:scale(.96);}
.tb-btn.on{color:var(--warning);border-color:rgba(251,191,36,.4);}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 2px;flex-shrink:0;}
.zoom-disp{
  font-size:13px;color:var(--text2);min-width:48px;text-align:center;
  font-family:'JetBrains Mono',monospace;flex-shrink:0;
}
.page-disp{
  font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0;
  font-family:'JetBrains Mono',monospace;
}

/* PDF表示エリア */
.pdf-viewport{
  flex:1;
  overflow:hidden;
  background:#1a1a1a;
  display:flex;
  flex-direction:column;
  min-height:0;
}
#pdfContent{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}
#pdfContent iframe{
  flex:1;
  width:100%;
  border:none;
  display:block;
  min-height:300px;
}

/* PDFページ（PDF.jsで描画するcanvas） */
.pdf-page-container{
  background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.6);
  border-radius:2px;flex-shrink:0;
  transform-origin:top center;transition:transform .15s;
}
canvas.pdf-canvas{display:block;}

/* ローディング */
.pdf-loading{
  color:var(--text2);font-size:13px;padding:40px;
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;
}
.pdf-loading-spin{
  width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.pdf-error{
  color:var(--danger);font-size:13px;padding:40px;text-align:center;
  background:rgba(252,129,129,.05);border:1px solid rgba(252,129,129,.2);
  border-radius:8px;margin:20px;
}

/* モーダルフッター */
.modal-footer{
  background:var(--surface);border-top:1px solid var(--border);
  padding:10px 14px;display:flex;gap:8px;
  justify-content:center;flex-shrink:0;flex-wrap:wrap;
}
.modal-btn{
  padding:9px 20px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:13px;
  font-family:inherit;cursor:pointer;font-weight:500;transition:all .15s;
  display:flex;align-items:center;gap:6px;
}
.modal-btn:hover{background:var(--border);}
.modal-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.modal-btn.primary:hover{background:var(--accent2);}
.modal-btn.fav-btn.on{color:var(--warning);}

/* ヒント */
.hint-toast{
  position:fixed;bottom:76px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.82);color:#fff;font-size:12px;
  padding:8px 18px;border-radius:20px;pointer-events:none;
  opacity:0;transition:opacity .25s;z-index:400;white-space:nowrap;
}
.hint-toast.show{opacity:1;}

/* スクロールバー */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ダイアログ */
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:600;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.dialog-overlay.open{opacity:1;pointer-events:all;}
.dialog-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:min(360px,90vw);box-shadow:0 20px 60px rgba(0,0,0,.6);transform:scale(.96);transition:transform .2s;}
.dialog-overlay.open .dialog-box{transform:scale(1);}
.dialog-title{font-size:16px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.dialog-sub{font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.dialog-section-label{font-size:11px;color:var(--text2);letter-spacing:.06em;margin-bottom:8px;}
.orient-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.orient-btn{padding:14px 8px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s;text-align:center;}
.orient-btn .orient-icon{font-size:24px;display:block;margin-bottom:6px;}
.orient-btn:hover{border-color:var(--accent);color:var(--text);}
.orient-btn.selected{border-color:var(--accent);background:var(--accent-glow);color:var(--accent2);font-weight:600;}
.dialog-actions{display:flex;gap:8px;margin-top:4px;}
.dialog-btn{flex:1;padding:11px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;transition:all .15s;}
.dialog-btn:hover{background:var(--border);}
.dialog-btn.exec{background:var(--accent);border-color:var(--accent);color:#fff;}
.dialog-btn.exec:hover{background:var(--accent2);}
.card-icon-btn{width:34px;height:34px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:15px;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.card-icon-btn:hover{background:var(--surface2);color:var(--text);}
.card-icon-btn.dl:hover{color:var(--accent2);}
.card-icon-btn.print:hover{color:var(--success);}
#printArea{display:none;}
@media print{body > *:not(#printArea){display:none !important;}#printArea{display:block !important;position:fixed;inset:0;z-index:9999;background:#fff;}#printArea iframe{width:100% !important;height:100% !important;border:none;}}
</style>
</head>
<body>

<!-- ローディング -->
<div id="loadingScreen">
  <div class="loading-logo">🗂️</div>
  <div class="loading-text">図面データを読み込んでいます...</div>
  <div class="loading-bar"><div class="loading-bar-inner"></div></div>
</div>

<!-- ログイン -->
<div id="loginScreen" style="display:none">
  <div class="login-box">
    <div class="login-logo">🗂️</div>
    <div class="login-title">浄化槽図面検索</div>
    <div class="login-sub">承認されたユーザーのみアクセスできます</div>
    <div class="login-field">
      <span class="login-field-icon">👤</span>
      <input class="login-input" type="text" id="loginId" placeholder="ID" autocomplete="username" autocapitalize="off">
    </div>
    <div class="login-field">
      <span class="login-field-icon">🔒</span>
      <input class="login-input" type="password" id="loginPw" placeholder="パスワード" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError">IDまたはパスワードが正しくありません</div>
  </div>
</div>

<!-- メイン -->
<div id="app">
  <header>
    <span class="header-logo">🗂️</span>
    <span class="header-title">浄化槽図面検索システム</span>
    <span class="header-username" id="headerUsername"></span>
    <button class="header-logout" onclick="doLogout()">ログアウト</button>
  </header>

  <!-- 検索エリア -->
  <div class="search-area">
    <div class="search-grid">
      <!-- メーカー -->
      <div class="search-field">
        <div class="search-label">🏭 メーカー名</div>
        <div class="search-input-wrap">
          <input class="search-field-input" id="inMaker" type="text" placeholder="例）クボタ、ニッコー"
            oninput="onInput('maker')" onkeydown="onKD(event,'maker')" onblur="delayClose('maker')" autocomplete="off" autocapitalize="off">
          <button class="field-clear" id="clrMaker" onclick="clearF('maker')">✕</button>
          <div class="ac-list" id="acMaker"></div>
        </div>
      </div>
      <!-- 型式 -->
      <div class="search-field">
        <div class="search-label">🔖 型　式</div>
        <div class="search-input-wrap">
          <input class="search-field-input" id="inSeries" type="text" placeholder="例）K-TC、BN、NSR"
            oninput="onInput('series')" onkeydown="onKD(event,'series')" onblur="delayClose('series')" autocomplete="off" autocapitalize="off">

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
'use strict';
// ════════════════════════════════
// ★★★ 設定エリア（ここを書き換えてください）★★★
// ════════════════════════════════
const CONFIG = {
  // users.csv の共有リンク（Googleドライブで共有→リンクをコピーして貼り付け）
  USERS_CSV_URL: 'users.csv',
  // drawings.csv のパス
  DRAW_CSV_URL:  'drawings.csv',
  SESSION_H: 8,  // セッション時間（時間）
};
// ════════════════════════════════
//
// ★ ファイルIDの確認方法 ★
// Google DriveでCSVファイルを右クリック
//   →「共有」→「リンクをコピー」
// コピーされたURLの中の /d/★ここ★/view の部分がファイルID
// ════════════════════════════════

// PDF.js設定
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─── グローバル状態 ───
let USERS = [];
let DRAWINGS = [];
let currentUser = null;
let favorites = {};      // {userId: [drawingKey, ...]}
let viewHistory = {};    // {userId: [{key,jinso,time}, ...]}

let selMaker='', selSeries='', selJinso='', currentTab='all';
let fiIdx = {maker:-1, series:-1, jinso:-1};

let currentItem = null;
let pdfDoc = null;
let currentPage = 1;
let totalPages = 1;
let zoomLevel = 1;
let rotateAngle = 0;
const ZOOM_MIN=0.25, ZOOM_MAX=4, ZOOM_STEP=0.25;

// ─── 初期化 ───
window.addEventListener('DOMContentLoaded', async () => {
  try {
    await loadCSVFiles();
    checkSession();
  } catch(e) {
    console.error('初期化エラー:', e);
    hideLoading();
  }
});

async function loadCSVFiles() {
  try {
    // Google DriveのダウンロードリンクからCSVを取得
    const [usersText, drawText] = await Promise.all([
      fetchCSV(CONFIG.USERS_CSV_URL),
      fetchCSV(CONFIG.DRAW_CSV_URL),
    ]);
    USERS    = parseCSV(usersText);
    DRAWINGS = parseCSV(drawText);
  } catch(e) {
    console.warn('CSVロード失敗。デモモードで起動します:', e);
    USERS    = DEMO_USERS;
    DRAWINGS = DEMO_DRAWINGS;
  }
}

async function fetchCSV(url) {
  // 相対パス・絶対URL両対応
  const res = await fetch(url);
  if (!res.ok) throw new Error('CSV取得失敗: ' + url);
  const text = await res.text();
  // HTMLが返ってきた場合はエラー（Googleドライブのリダイレクトページ対策）
  if (text.trim().startsWith('<!')) throw new Error('CSVではなくHTMLが返されました');
  return text;
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/).filter(l=>l.trim());
  const headers = lines[0].split(',').map(h=>h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v=>v.trim());
    const obj = {};
    headers.forEach((h,i) => obj[h] = vals[i] ?? '');
    return obj;
  });
}



// ─── セッション管理 ───
function checkSession() {
  const saved = localStorage.getItem('jokaso_session');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      const expired = Date.now() - s.loginAt > CONFIG.SESSION_H * 3600 * 1000;
      if (!expired) {
        currentUser = s.user;
        loadUserData();
        hideLoading();
        showApp();
        return;
      }
    } catch(e) {}
    localStorage.removeItem('jokaso_session');
  }
  hideLoading();
  showLogin();
}

function saveSession(user) {
  localStorage.setItem('jokaso_session', JSON.stringify({
    user, loginAt: Date.now()
  }));
}

function loadUserData() {
  const uid = currentUser.ID;
  const rawFav  = localStorage.getItem('jokaso_fav_'  + uid);
  const rawHist = localStorage.getItem('jokaso_hist_' + uid);
  favorites[uid]    = rawFav  ? JSON.parse(rawFav)  : [];
  viewHistory[uid]  = rawHist ? JSON.parse(rawHist) : [];
}

function saveUserData() {
  const uid = currentUser.ID;
  localStorage.setItem('jokaso_fav_'  + uid, JSON.stringify(favorites[uid]  || []));
  localStorage.setItem('jokaso_hist_' + uid, JSON.stringify(viewHistory[uid] || []));
}

// ─── ログイン ───
function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginError');

  const user = USERS.find(u =>
    u['ID'] === id &&
    u['パスワード'] === pw &&
    u['有効'] === '○'
  );

  if (!user) {
    err.classList.add('show');
    document.getElementById('loginPw').value = '';
    return;
  }
  err.classList.remove('show');
  currentUser = user;
  saveSession(user);
  loadUserData();
  document.getElementById('loginScreen').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('loginScreen').style.display = 'none';
    showApp();
  }, 400);
}

function doLogout() {
  if (!confirm('ログアウトしますか？')) return;
  localStorage.removeItem('jokaso_session');
  location.reload();
}

function showLogin() {
  const ls = document.getElementById('loginScreen');
  ls.style.display = 'flex';
  requestAnimationFrame(() => ls.classList.remove('hidden'));
}

function showApp() {
  document.getElementById('headerUsername').textContent = currentUser['名前'] + ' さん';
  document.getElementById('app').classList.add('visible');
  renderHome();
}

function hideLoading() {
  const el = document.getElementById('loadingScreen');
  el.classList.add('hidden');
  setTimeout(() => el.style.display = 'none', 500);
}

// ─── ホーム描画 ───
function myFavs()  { return favorites[currentUser.ID]    || []; }
function myHist()  { return viewHistory[currentUser.ID]  || []; }

function renderHome() {
  // お気に入り
  const favDiv = document.getElementById('favList');
  const favs = myFavs();
  if (!favs.length) {
    favDiv.innerHTML = '<div class="fav-empty">お気に入りはまだありません。図面を開いて ☆ を押して登録できます。</div>';
  } else {
    favDiv.innerHTML = favs.map(key => {
      const [maker,series,jinso,type] = key.split('|');
      return `<div class="fav-chip" onclick="openByKey('${key}')">
        <span class="star">★</span>
        <div><div class="fav-name">${series}</div>
        <div class="fav-sub">${maker} · ${jinso}人槽</div></div>
      </div>`;
    }).join('');
  }

  // 履歴
  const histDiv = document.getElementById('historyList');
  const hist = myHist().slice(0, 8);
  if (!hist.length) {
    histDiv.innerHTML = '<div class="fav-empty">まだ閲覧履歴がありません。</div>';
  } else {
    histDiv.innerHTML = hist.map(h => {
      const d = findDrawing(h.maker, h.series, h.jinso);
      if (!d) return '';
      return `<div class="history-item" onclick="openPDF('${h.maker}','${h.series}',${h.jinso})">
        <span class="history-icon">📄</span>
        <span class="history-name">${d['ファイル名']}（${h.jinso}人槽）</span>
        <span class="history-time">${h.time}</span>
      </div>`;
    }).join('');
  }
}

function findDrawing(maker, series, jinso) {
  return DRAWINGS.find(d =>
    d['メーカー'] === maker &&
    d['型式'] === series &&
    String(d['人槽']) === String(jinso)
  );
}

function openByKey(key) {
  const [maker,series,jinso] = key.split('|');
  openPDF(maker, series, Number(jinso));
}

// ─── オートコンプリート ───
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function getFieldId(f) {
  return {maker:'inMaker', series:'inSeries', jinso:'inJinso'}[f];
}
function getAcId(f) {
  return {maker:'acMaker', series:'acSeries', jinso:'acJinso'}[f];
}
function getClearId(f) {
  return {maker:'clrMaker', series:'clrSeries', jinso:'clrJinso'}[f];
}

function getCandidates(field) {
  const mQ = document.getElementById('inMaker').value.trim().toLowerCase();
  const sQ = document.getElementById('inSeries').value.trim().toLowerCase();
  const jQ = document.getElementById('inJinso').value.replace('人槽','').trim();

  const base = DRAWINGS.filter(d => {
    const tabOk = currentTab==='all' || d['種別']===currentTab;
    const mOk = field==='maker' || !selMaker || d['メーカー']===selMaker;
    const sOk = field==='series' || !selSeries || d['型式']===selSeries;
    const jOk = field==='jinso' || !selJinso || String(d['人槽'])===selJinso;
    return tabOk && mOk && sOk && jOk;
  });

  if (field==='maker')  return [...new Set(base.map(d=>d['メーカー']))];
  if (field==='series') return [...new Set(base.map(d=>d['型式']))];
  if (field==='jinso')  return [...new Set(base.map(d=>d['人槽']))].sort((a,b)=>Number(a)-Number(b)).map(String);
}

function onInput(field) {
  const val = document.getElementById(getFieldId(field)).value;
  document.getElementById(getClearId(field)).classList.toggle('visible', val.length > 0);
  if (field==='maker')  selMaker='';
  if (field==='series') selSeries='';
  if (field==='jinso')  selJinso='';
  fiIdx[field] = -1;

  const q = val.replace('人槽','').trim();
  const cands = getCandidates(field)
    .filter(c => String(c).toLowerCase().includes(q.toLowerCase()));
  showAC(field, cands, q);
  runSearch();
}

function showAC(field, cands, query) {
  const list = document.getElementById(getAcId(field));
  if (!cands.length || !query) { list.classList.remove('open'); return; }
  list.innerHTML = cands.map(c => {
    const label = field==='jinso' ? c+'人槽' : c;
    const hl = query ? label.replace(new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'), m=>`<mark>${m}</mark>`) : label;
    return `<div class="ac-item" data-val="${c}" onmousedown="selectItem('${field}','${c}')">${hl}</div>`;
  }).join('');
  list.classList.add('open');
}

function selectItem(field, val) {
  document.getElementById(getFieldId(field)).value = field==='jinso' ? val+'人槽' : val;
  document.getElementById(getClearId(field)).classList.add('visible');
  if (field==='maker')  selMaker=val;
  if (field==='series') selSeries=val;
  if (field==='jinso')  selJinso=val;
  document.getElementById(getAcId(field)).classList.remove('open');
  runSearch();
}

function onKD(e, field) {
  const list = document.getElementById(getAcId(field));
  const items = list.querySelectorAll('.ac-item');
  if (!list.classList.contains('open')) return;
  if (e.key==='ArrowDown') {
    e.preventDefault();
    fiIdx[field] = Math.min(fiIdx[field]+1, items.length-1);
    items.forEach((el,i) => el.classList.toggle('focused', i===fiIdx[field]));
  } else if (e.key==='ArrowUp') {
    e.preventDefault();
    fiIdx[field] = Math.max(fiIdx[field]-1, 0);
    items.forEach((el,i) => el.classList.toggle('focused', i===fiIdx[field]));
  } else if (e.key==='Enter') {
    if (fiIdx[field] >= 0 && items[fiIdx[field]])
      selectItem(field, items[fiIdx[field]].dataset.val);
  } else if (e.key==='Escape') {
    list.classList.remove('open');
  }
}
function delayClose(field) {
  setTimeout(() => document.getElementById(getAcId(field)).classList.remove('open'), 180);
}
function clearF(field) {
  document.getElementById(getFieldId(field)).value = '';
  document.getElementById(getClearId(field)).classList.remove('visible');
  document.getElementById(getAcId(field)).classList.remove('open');
  if (field==='maker')  selMaker='';
  if (field==='series') selSeries='';
  if (field==='jinso')  selJinso='';
  runSearch();
}

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  runSearch();
}
function resetAll() {
  ['maker','series','jinso'].forEach(f => clearF(f));
  currentTab = 'all';
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn')[0].classList.add('active');
  runSearch();
}

// ─── 検索実行 ───
function runSearch() {
  const mQ = document.getElementById('inMaker').value.trim().toLowerCase();
  const sQ = document.getElementById('inSeries').value.trim().toLowerCase();
  const jQ = document.getElementById('inJinso').value.replace('人槽','').trim();
  const hasFilter = mQ || sQ || jQ || currentTab !== 'all';

  if (!hasFilter) {
    document.getElementById('homeView').style.display = '';
    document.getElementById('searchView').style.display = 'none';
    return;
  }
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('searchView').style.display = '';

  const filtered = DRAWINGS.filter(d => {
    const tOk = currentTab==='all' || d['種別']===currentTab;
    const mOk = !mQ || d['メーカー'].toLowerCase().includes(mQ);
    const sOk = !sQ || d['型式'].toLowerCase().includes(sQ);
    const jOk = !jQ || String(d['人槽'])===jQ;
    return tOk && mOk && sOk && jOk;
  });

  // 同一ファイルをまとめる（メーカー＋型式＋ファイル名でグループ）
  const groups = {};
  filtered.forEach(d => {
    const key = d['メーカー'] + '|' + d['型式'] + '|' + d['ファイル名'];
    if (!groups[key]) groups[key] = { ...d, jinsoList: [] };
    groups[key].jinsoList.push(Number(d['人槽']));
  });
  const grouped = Object.values(groups).map(g => ({
    ...g,
    jinsoList: g.jinsoList.sort((a,b)=>a-b)
  }));

  document.getElementById('resultLabel').textContent = `検索結果：${grouped.length}件`;

  if (!grouped.length) {
    document.getElementById('results').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">条件に一致する図面が見つかりませんでした</div>
        <div class="empty-sub">メーカー名・型式・人槽を変えて再検索してみてください</div>
      </div>`;
    return;
  }

  const targetJ = jQ ? Number(jQ) : null;

  document.getElementById('results').innerHTML = grouped.map(g => {
    const fkey = `${g['メーカー']}|${g['型式']}|${targetJ||g.jinsoList[0]}|${g['種別']}`;
    const isFav = myFavs().includes(fkey);
    const jRange = g.jinsoList.length===1
      ? g.jinsoList[0]+'人槽'
      : g.jinsoList[0]+'〜'+g.jinsoList[g.jinsoList.length-1]+'人槽';
    const jLabel = targetJ
      ? `<span class="result-jinso">${targetJ}人槽</span>（${g['ファイル名']}）`
      : `${jRange}（${g['ファイル名']}）`;
    const showJ = targetJ || g.jinsoList[0];
    const isTan = g['種別']==='単独';

    return `<div class="result-card" onclick="openPDF('${g['メーカー']}','${g['型式']}',${showJ})">
      <div class="result-icon">📄</div>
      <div class="result-info">
        <div class="result-name">${g['メーカー']}　${g['型式']}</div>
        <div class="result-meta">${jLabel}</div>
      </div>
      <div class="result-actions">
        <button class="star-btn ${isFav?'on':''}" title="お気に入り"
          onclick="event.stopPropagation();quickFav('${g['メーカー']}','${g['型式']}',${showJ},'${g['種別']}',this)">
          ${isFav?'★':'☆'}
        </button>
        <button class="card-icon-btn print" title="印刷"
          onclick="event.stopPropagation();openPrintDialog('card','${g['メーカー']}','${g['型式']}',${showJ})">🖨️</button>
        <button class="card-icon-btn dl" title="ダウンロード"
          onclick="event.stopPropagation();openDownloadDialog('card','${g['メーカー']}','${g['型式']}',${showJ})">⬇</button>
        <span class="result-badge ${isTan?'badge-s':'badge-g'}">${isTan?'単独':'合併'}</span>
      </div>
    </div>`;
  }).join('');
}

function quickFav(maker, series, jinso, type, btn) {
  const key = `${maker}|${series}|${jinso}|${type}`;
  const uid = currentUser.ID;
  if (!favorites[uid]) favorites[uid] = [];
  if (favorites[uid].includes(key)) {
    favorites[uid] = favorites[uid].filter(k=>k!==key);
    btn.textContent = '☆'; btn.classList.remove('on');
  } else {
    favorites[uid].push(key);
    btn.textContent = '★'; btn.classList.add('on');
  }
  saveUserData();
  renderHome();
}

// ─── PDF表示 ───
async function openPDF(maker, series, jinso) {
  const d = findDrawing(maker, series, jinso);
  if (!d) { showHint('図面データが見つかりません'); return; }

  currentItem = { maker, series, jinso, type:d['種別'], filename:d['ファイル名'] };

  // 履歴追加
  const uid = currentUser.ID;
  if (!viewHistory[uid]) viewHistory[uid] = [];
  viewHistory[uid] = [
    { maker, series, jinso, time: formatTime(new Date()) },
    ...viewHistory[uid].filter(h => !(h.maker===maker && h.series===series && h.jinso===jinso))
  ].slice(0, 10);
  saveUserData();
  renderHome();

  // モーダル表示
  document.getElementById('modalTitle').textContent = `${d['ファイル名']}（${jinso}人槽）`;

  zoomLevel = 1;
  rotateAngle = 0;
  currentPage = 1;
  pdfDoc = null;

  document.getElementById('pdfModal').classList.add('open');

  // PDF表示：新しいタブでGoogleドライブのPDFを開く
  const pdfContent = document.getElementById('pdfContent');

  if (!previewUrl) {
    pdfContent.innerHTML = '<div class="pdf-error">⚠️ 図面のURLが登録されていません。<br>drawings.csvのファイルURL列を確認してください。</div>';
    return;

}

function getPDFUrl(drawing, mode) {
  // drawings.csvの「ファイルURL」列からURLを取得
  const rawUrl = drawing['ファイルURL'] || '';
  if (!rawUrl) return '';

  // GoogleドライブのファイルIDを抽出
  const match = rawUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (match) {
    const fileId = match[1];
    if (mode === 'download') {
      // ダウンロード用URL
      return `https://drive.google.com/uc?export=download&id=${fileId}`;
    }
    // 表示用：Googleドライブプレビュー（iframeで埋め込み可能）
    return `https://drive.google.com/file/d/${fileId}/preview`;
  }
  return rawUrl;
}

async function renderCurrentPage() {
  if (!pdfDoc) return;
  const content = document.getElementById('pdfContent');
  content.innerHTML = `<div class="pdf-loading">
    <div class="pdf-loading-spin"></div><span>${currentPage}ページを描画中...</span></div>`;

  try {
    const page = await pdfDoc.getPage(currentPage);
    const viewport = page.getViewport({ scale: 1, rotation: rotateAngle });

    // 画面幅に合わせたスケール計算
    const vp = document.getElementById('pdfViewport');
    const maxW = vp.clientWidth - 32;
    const fitScale = Math.min(maxW / viewport.width, 1.5);
    const scale = fitScale * zoomLevel;
    const scaledVP = page.getViewport({ scale, rotation: rotateAngle });

    const canvas = document.createElement('canvas');
    canvas.className = 'pdf-canvas';
    const ctx = canvas.getContext('2d');
    canvas.width  = scaledVP.width;
    canvas.height = scaledVP.height;

    const container = document.createElement('div');
    container.className = 'pdf-page-container';
    container.appendChild(canvas);

    content.innerHTML = '';
    content.appendChild(container);

    await page.render({ canvasContext: ctx, viewport: scaledVP }).promise;
  } catch(e) {
    console.error('ページ描画エラー:', e);
    content.innerHTML = `<div class="pdf-error">ページの描画に失敗しました（${currentPage}ページ）</div>`;
  }
}

function updatePageDisp() {
  document.getElementById('pageDisp').textContent = `${currentPage} / ${totalPages}`;
}

async function prevPage() {
  if (!pdfDoc || currentPage <= 1) return;
  currentPage--;
  updatePageDisp();
  await renderCurrentPage();
  document.getElementById('pdfViewport').scrollTo(0,0);
}
async function nextPage() {
  if (!pdfDoc || currentPage >= totalPages) return;
  currentPage++;
  updatePageDisp();
  await renderCurrentPage();
  document.getElementById('pdfViewport').scrollTo(0,0);
}

function closeModal() {
  document.getElementById('pdfModal').classList.remove('open');
  pdfDoc = null;
}

function toggleFav() {
  if (!currentItem) return;
  const { maker, series, jinso, type } = currentItem;
  const key = `${maker}|${series}|${jinso}|${type}`;
  const uid = currentUser.ID;
  if (!favorites[uid]) favorites[uid] = [];
  const isFav = favorites[uid].includes(key);
  if (isFav) favorites[uid] = favorites[uid].filter(k=>k!==key);
  else favorites[uid].push(key);
  saveUserData();
  const favBtn = document.getElementById('favModalBtn');
  const nowFav = !isFav;
  favBtn.textContent = nowFav ? '★ お気に入り済み' : '☆ お気に入り';
  favBtn.classList.toggle('on', nowFav);
  showHint(nowFav ? '⭐ お気に入りに追加しました' : 'お気に入りから削除しました');
  renderHome();
}

// 印刷・ダウンロード機能
// ════════════════════════════════

// ダイアログ用の一時データ
let dialogTarget = null;   // 操作対象の図面データ
let printOrient  = 'portrait'; // 印刷向き

// --- 印刷ダイアログを開く ---
function openPrintDialog(source, maker, series, jinso) {
  // sourceが'modal'なら現在開いている図面、'card'なら引数から
  if (source === 'modal') {
    if (!currentItem) return;
    dialogTarget = { ...currentItem };
  } else {
    const d = findDrawing(maker, series, jinso);
    if (!d) return;
    dialogTarget = { maker, series, jinso, type: d['種別'], filename: d['ファイル名'], drawing: d };
  }
  const d = source === 'modal' ? findDrawing(currentItem.maker, currentItem.series, currentItem.jinso) : dialogTarget.drawing || findDrawing(maker, series, jinso);
  document.getElementById('printDialogSub').textContent =
    (dialogTarget.maker || maker) + ' ' + (dialogTarget.series || series) + '　' + (dialogTarget.jinso || jinso) + '人槽';

  // 向きをデフォルトに戻す
  selectOrient('portrait');
  document.getElementById('printDialog').classList.add('open');
}

function closePrintDialog() {
  document.getElementById('printDialog').classList.remove('open');
}

function selectOrient(orient) {
  printOrient = orient;
  document.getElementById('orientPortrait').classList.toggle('selected', orient === 'portrait');
  document.getElementById('orientLandscape').classList.toggle('selected', orient === 'landscape');
}

async function execPrint() {
  closePrintDialog();
  if (!dialogTarget) return;

  const d = findDrawing(dialogTarget.maker, dialogTarget.series, dialogTarget.jinso);
  if (!d || !d['ファイルURL']) {
    showHint('⚠️ 図面のURLが登録されていません');
    return;
  }

  showHint('🖨️ 印刷を準備しています...');
  const url = getPDFUrl(d);

  // iframe に PDF を読み込んで印刷
  const printArea = document.getElementById('printArea');
  printArea.innerHTML = '';
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:100%;border:none;';
  iframe.src = url;
  printArea.appendChild(iframe);

  iframe.onload = () => {
    setTimeout(() => {
      // 印刷向きをCSSで指定
      const style = document.createElement('style');
      style.textContent = '@page { size: ' + (printOrient === 'landscape' ? 'A4 landscape' : 'A4 portrait') + '; margin: 10mm; }';
      document.head.appendChild(style);
      window.print();
      setTimeout(() => {
        document.head.removeChild(style);
        printArea.innerHTML = '';
      }, 1000);
    }, 800);
  };
}

// --- ダウンロードダイアログを開く ---
function openDownloadDialog(source, maker, series, jinso) {
  if (source === 'modal') {
    if (!currentItem) return;
    dialogTarget = { ...currentItem };
    const d = findDrawing(currentItem.maker, currentItem.series, currentItem.jinso);
    dialogTarget.drawing = d;
  } else {
    const d = findDrawing(maker, series, jinso);
    if (!d) return;
    dialogTarget = { maker, series, jinso, type: d['種別'], filename: d['ファイル名'], drawing: d };
  }

  const sub = (dialogTarget.maker || maker) + ' ' + (dialogTarget.series || series) + '　' + (dialogTarget.jinso || jinso) + '人槽';
  document.getElementById('dlDialogSub').innerHTML =
    sub + '<br><span style="color:var(--text3);font-size:11px">※ PDFファイルとして保存されます</span>';

  document.getElementById('downloadDialog').classList.add('open');
}

function closeDownloadDialog() {
  document.getElementById('downloadDialog').classList.remove('open');
}

function execDownload() {
  closeDownloadDialog();
  if (!dialogTarget) return;

  const d = dialogTarget.drawing || findDrawing(dialogTarget.maker, dialogTarget.series, dialogTarget.jinso);
  if (!d || !d['ファイルURL']) {
    showHint('⚠️ 図面のURLが登録されていません');
    return;
  }

  const url = getPDFUrl(d);
  const filename = d['ファイル名'] || (dialogTarget.maker + '_' + dialogTarget.series + '_' + dialogTarget.jinso + '人槽.pdf');

  // aタグでダウンロード
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showHint('⬇ ダウンロードを開始しました');
}

// 後方互換
function downloadPDF() { openDownloadDialog('modal'); }

// ─── ズーム・回転 ───
async function zoomIn()  { zoomLevel = Math.min(zoomLevel+ZOOM_STEP, ZOOM_MAX); await renderCurrentPage(); updateZoomDisp(); }
async function zoomOut() { zoomLevel = Math.max(zoomLevel-ZOOM_STEP, ZOOM_MIN); await renderCurrentPage(); updateZoomDisp(); }
async function zoomReset() { zoomLevel = 1; await renderCurrentPage(); updateZoomDisp(); showHint('等倍表示'); }
async function zoomFit()   { zoomLevel = 1; await renderCurrentPage(); updateZoomDisp(); showHint('全体表示'); }
function updateZoomDisp() {
  document.getElementById('zoomDisp').textContent = Math.round(zoomLevel*100)+'%';
}
async function rotatePage(deg) {
  rotateAngle = (rotateAngle + deg + 360) % 360;
  await renderCurrentPage();
  const labels = ['元の向き','右90°','180°','左90°'];
  showHint('🔄 ' + (labels[rotateAngle/90] || rotateAngle+'°'));
}

// ─── ヒント ───
function showHint(msg) {
  const el = document.getElementById('hintToast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1600);
}

// ─── ユーティリティ ───
function formatTime(d) {
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'たった今';
  if (diff < 3600000) return `${Math.floor(diff/60000)}分前`;
  if (d.toDateString() === now.toDateString()) return `今日 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  return `昨日 ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

// ─── タッチ・キーボード ───
// ピンチズーム
let _initDist=0, _initZoom=1;
document.getElementById('pdfViewport').addEventListener('touchstart', e => {
  if (e.touches.length===2) {
    _initDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    _initZoom = zoomLevel;
  }
}, {passive:true});
document.getElementById('pdfViewport').addEventListener('touchmove', async e => {
  if (e.touches.length===2) {
    e.preventDefault();
    const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const newZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, _initZoom*(dist/_initDist)));
    if (Math.abs(newZoom - zoomLevel) > 0.05) {
      zoomLevel = newZoom;
      updateZoomDisp();
    }
  }
}, {passive:false});
document.getElementById('pdfViewport').addEventListener('touchend', async e => {
  if (pdfDoc) await renderCurrentPage();
}, {passive:true});

// マウスホイールズーム
document.getElementById('pdfViewport').addEventListener('wheel', async e => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    if (e.deltaY < 0) await zoomIn(); else await zoomOut();
  }
}, {passive:false});

// キーボード
document.addEventListener('keydown', async e => {
  if (e.key==='Escape') closeModal();
  if (!document.getElementById('pdfModal').classList.contains('open')) return;
  if (e.key==='+' || e.key==='=') await zoomIn();
  if (e.key==='-') await zoomOut();
  if (e.key==='0') await zoomReset();
  if (e.key==='r' || e.key==='R') await rotatePage(90);
  if (e.key==='ArrowRight' || e.key==='ArrowDown') await nextPage();
  if (e.key==='ArrowLeft'  || e.key==='ArrowUp')   await prevPage();
});
